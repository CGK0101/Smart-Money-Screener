name: Daily Smart Money Report

on:
  schedule:
    # NSE publishes sec_bhavdata_full ~18:30-19:00 IST.
    # Two attempts: 19:15 IST and 20:30 IST (13:45 & 15:00 UTC), Mon-Fri.
    - cron: "45 13 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Auto-backfill history on first run (~10 min, once only)
        run: |
          count=$(ls data/bhav/*.csv 2>/dev/null | wc -l)
          echo "Stored history: $count days"
          if [ "$count" -lt 30 ]; then
            python scripts/backfill.py --days 250
          fi

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily.py

      - name: Commit data + report
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "report: $(date +%F)"
          git push
