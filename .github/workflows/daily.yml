name: Daily Smart Money Report

on:
  schedule:
    # NSE publishes sec_bhavdata_full ~18:30-19:00 IST. GitHub's scheduler
    # runs jobs LATE under load, worst at popular minutes (:00/:15/:30/:45),
    # so we use odd minutes and three attempts:
    #   19:22 IST and 21:07 IST evening attempts, plus a 05:41 IST overnight
    #   safety net guaranteeing freshness before market open.
    - cron: "52 13 * * 1-5"    # 19:22 IST Mon-Fri
    - cron: "37 15 * * 1-5"    # 21:07 IST Mon-Fri
    - cron: "11 0 * * 2-6"     # 05:41 IST Tue-Sat (covers Mon-Fri sessions)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Auto-backfill history on first run (~10 min, once only)
        run: |
          count=$(ls data/bhav/*.csv 2>/dev/null | wc -l)
          echo "Stored history: $count days"
          if [ "$count" -lt 30 ]; then
            python scripts/backfill.py --days 250
          fi

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily.py

      - name: Commit data + report
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "report: $(date +%F)"
          git push
