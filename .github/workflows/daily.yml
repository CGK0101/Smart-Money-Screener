name: Daily Smart Money Report

on:
  schedule:
    # GitHub's free scheduler runs LATE and unpredictably under load, so we
    # fire hourly across the whole evening rather than betting on one slot.
    # Runs that find no new data exit in ~40s and cost nothing.
    #   19:22, 20:22, 21:22, 22:22, 23:22 IST (Mon-Fri)  + 05:41 IST safety net
    - cron: "52 13 * * 1-5"    # 19:22 IST
    - cron: "52 14 * * 1-5"    # 20:22 IST
    - cron: "52 15 * * 1-5"    # 21:22 IST
    - cron: "52 16 * * 1-5"    # 22:22 IST
    - cron: "52 17 * * 1-5"    # 23:22 IST
    - cron: "11 0 * * 2-6"     # 05:41 IST overnight guarantee
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Auto-backfill history on first run (~10 min, once only)
        run: |
          count=$(ls data/bhav/*.csv 2>/dev/null | wc -l)
          echo "Stored history: $count days"
          if [ "$count" -lt 30 ]; then
            python scripts/backfill.py --days 250
          fi

      - name: Auto-backfill FO metrics on first run (~15 min, once only)
        run: |
          rows=$(wc -l < data/fo_metrics.csv 2>/dev/null || echo 0)
          echo "FO metrics rows: $rows"
          if [ "$rows" -lt 60 ]; then
            python scripts/backfill_fo.py --days 90
          fi

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily.py

      - name: Commit data + report
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "report: $(date +%F)"
          git push
